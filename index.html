        if(currentPage > 1) phtml += `<button onclick="goPage(${currentPage-1})">上一页</button>`;
        phtml += `<span style="font-weight:600; padding:0 10px;">${currentPage} / ${totalPages}</span>`;
        if(currentPage < totalPages) phtml += `<button onclick="goPage(${currentPage+1})">下一页</button>`;
    }
    document.getElementById('pagination').innerHTML = phtml;
}

function goPage(n) { currentPage = n; window.scrollTo({top: document.querySelector('.search-container').offsetTop - 20, behavior: 'smooth'}); render(); }

document.getElementById('searchInput').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    filtered = threads.filter(t => t.title.toLowerCase().includes(q)).reverse();
    currentPage = 1;
    render();
});

// Initialize
render();
</script>
</body></html>
