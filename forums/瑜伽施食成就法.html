<script>
// ---------- 顶级沉浸式无缝卷轴弹窗 (Mobile Optimized) ----------
(function() {
    if(document.getElementById('quickViewer')) return;
    const modalHTML = `
    <style>
    #quickViewer { display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; background:rgba(0,0,0,0.9); backdrop-filter:blur(15px); -webkit-backdrop-filter:blur(15px); opacity:0; transition:opacity 0.3s ease; box-sizing:border-box; align-items:center; justify-content:center; }
    #quickViewerContent { background:var(--bg); width:100%; height:100%; border-radius:0; position:relative; transform:translateY(100%); opacity:0; transition:transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 0 50px rgba(0,0,0,0.8); }
    @media(min-width: 850px) {
      #quickViewerContent { max-width:900px; height:95%; max-height:95vh; border-radius:16px; transform:translateY(30px) scale(0.95); border:1px solid rgba(212,175,55,0.2); }
    }
    #quickViewerHeader { padding:18px 24px; border-bottom:1px solid rgba(212,175,55,0.1); background:var(--surface-solid); display:flex; justify-content:space-between; align-items:center; z-index:10; }
    #quickViewerBody { padding:0; overflow-y:auto; overflow-x:hidden; flex:1; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
    </style>
    <div id="quickViewer">
        <div id="quickViewerContent">
            <div id="quickViewerHeader">
                <div style="font-weight:700; color:var(--primary); font-size:17px; display:flex; align-items:center; letter-spacing:1px;"><span style="font-size:20px; margin-right:10px;">❖</span> 典藏经卷阅读</div>
                <button id="quickViewerClose" style="background:rgba(255,255,255,0.1); border:none; width:36px; height:36px; border-radius:50%; font-size:18px; cursor:pointer; color:var(--text); display:flex; align-items:center; justify-content:center; transition:all 0.2s;">✕</button>
            </div>
            <div id="quickViewerBody">
                <div style="text-align:center; padding:100px; color:var(--primary); opacity:0.8;">
                    <div style="font-size:40px; margin-bottom:20px; animation: pulse 1.5s infinite;">📿</div>
                    <div style="font-weight:600; letter-spacing:2px; font-family:'Noto Serif SC', serif;">正在降临...</div>
                </div>
            </div>
        </div>
    </div>
    <style>@keyframes pulse { 0% {transform:scale(0.95); opacity:0.5;} 50% {transform:scale(1.05); opacity:1;} 100% {transform:scale(0.95); opacity:0.5;} }</style>
    `;
    document.body.insertAdjacentHTML('beforeend', modalHTML);

    const qv = document.getElementById('quickViewer');
    const qvContent = document.getElementById('quickViewerContent');
    const qvBody = document.getElementById('quickViewerBody');
    const qvClose = document.getElementById('quickViewerClose');

    function openViewer(url) {
        qv.style.display = 'flex';
        void qv.offsetWidth; // trigger reflow
        qv.style.opacity = '1';
        qvContent.style.opacity = '1';
        if(window.innerWidth >= 850) {
            qvContent.style.transform = 'translateY(0) scale(1)';
        } else {
            qvContent.style.transform = 'translateY(0)';
        }
        document.body.style.overflow = 'hidden'; // Lock background scroll entirely
        
        qvBody.innerHTML = '<div style="text-align:center; padding:120px; color:var(--primary); opacity:0.8;"><div style="font-size:45px; margin-bottom:20px; animation: pulse 1.5s infinite;">📿</div><div style="font-family:\'Noto Serif SC\', serif; font-size:18px; letter-spacing:2px;">开启法卷...</div></div>';
        
        fetch(url).then(res => res.text()).then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            let contentContainer = doc.querySelector('.container');
            if(contentContainer) {
                let bread = contentContainer.querySelector('.breadcrumb');
                if(bread) bread.remove();
                contentContainer.style.margin = '20px auto 60px';
                qvBody.innerHTML = '';
                qvBody.appendChild(contentContainer);
                qvBody.scrollTop = 0;
            } else {
                window.location.href = url;
            }
        }).catch(err => {
            window.location.href = url;
        });
    }

    function closeViewer() {
        qv.style.opacity = '0';
        qvContent.style.opacity = '0';
        if(window.innerWidth >= 850) {
            qvContent.style.transform = 'translateY(30px) scale(0.95)';
        } else {
            qvContent.style.transform = 'translateY(100%)';
        }
        setTimeout(() => {
            qv.style.display = 'none';
            document.body.style.overflow = '';
            qvBody.innerHTML = '';
        }, 400);
    }

    qvClose.addEventListener('click', closeViewer);
    qvClose.addEventListener('mouseover', () => qvClose.style.background = 'rgba(255,255,255,0.2)');
    qvClose.addEventListener('mouseout', () => qvClose.style.background = 'rgba(255,255,255,0.1)');
    
    qv.addEventListener('click', (e) => {
        if(e.target === qv && window.innerWidth >= 850) closeViewer();
    });

    document.addEventListener('click', (e) => {
        let link = e.target.closest('a.thread-card, a.thread-row');
        if(link && link.href && link.href.includes('threads/')) {
            e.preventDefault();
            openViewer(link.href);
        }
    });
})();
</script>
