<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
<title>藏密修海 ❖ 须弥法眼搜索</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
:root { 
    --bg: #0d0a09; 
    --surface: rgba(24, 18, 16, 0.85); 
    --surface-solid: #1a1412;
    --text: #dfd5c5; 
    --text-muted: #8b8073; 
    --primary: #d4af37; 
    --primary-hover: #f1c40f; 
    --accent: #8a1c1c; 
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--text); padding: 0; margin: 0; line-height: 1.8; background-image: radial-gradient(#241b18 1px, transparent 1px); background-size: 30px 30px; overflow-x: hidden; -webkit-tap-highlight-color: transparent;}
h1, h2, h3 { font-family: 'Noto Serif SC', serif; }
.hero { position: relative; text-align: center; padding: 60px 20px; background: radial-gradient(circle at center, #2d0f0f 0%, #0d0a09 100%); color: var(--primary); border-bottom: 2px solid rgba(212, 175, 55, 0.1); }
.hero h1 { font-size: clamp(24px, 8vw, 46px); margin: 0 0 16px 0; font-weight: 700; letter-spacing: 4px; text-shadow: 0 2px 20px rgba(212, 175, 55, 0.4); }
.container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
.cloud-card { background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(20,10,10,0.9) 100%); border: 1px solid rgba(212,175,55,0.2); border-radius: 16px; padding: 25px; margin-bottom: 50px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.cloud-badge { padding: 8px 16px; border-radius: 30px; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); font-family: 'Noto Serif SC', serif; margin: 6px; display: inline-block; }
.cloud-badge:hover { background: rgba(212,175,55,0.2) !important; color: #fff !important; transform: scale(1.1) translateY(-2px); box-shadow: 0 5px 15px rgba(212,175,55,0.3);}
</style>
<link href="./pagefind/pagefind-ui.css" rel="stylesheet">
</head>
<body>

<div class="hero">
    <h1>藏密修海 ❖ 须弥法眼搜索</h1>
    <p style="color: var(--text-muted); font-style: italic;">于浩瀚大藏之间，寻觅法缘。</p>
    <a href="index.html" style="color: var(--primary); text-decoration: none; border: 1px solid var(--primary); padding: 8px 24px; border-radius: 30px; font-size: 14px; margin-top: 20px; display: inline-block; transition: all 0.3s;">❖ 返回法阵首页 ❖</a>
</div>

<div class="container">
    <div class="cloud-card">
        <h2 style="color: var(--primary); font-size: 20px; letter-spacing: 4px; margin-bottom: 10px;">❖ 万象词典云 ❖</h2>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 25px;">点击法词，即刻照见三千大千世界</p>
        <div id="wordCloud"></div>
    </div>

    <div id="search"></div>
</div>

<script src="./pagefind/pagefind-ui.js"></script>
<script>
window.addEventListener('DOMContentLoaded', () => {
    new PagefindUI({ 
        element: "#search", 
        showSubResults: true,
        translations: {
            placeholder: "输入法言、经名、仪轨，叩问法界...",
            clear_search: "清除",
            load_more: "加载更多法卷",
            search_label: "全站搜索",
            filters_label: "过滤器",
            zero_results: "法界未显示【[SEARCH_TERM]】之痕迹",
            many_results: "为【[SEARCH_TERM]】显现 [COUNT] 卷法轴",
            one_result: "为【[SEARCH_TERM]】显现 [COUNT] 卷法轴",
            alt_search: "未获结果，但发现相近法音：[SEARCH_TERM]",
            search_suggestion: "为您建议：[SEARCH_TERM]",
            searching: "正在法界观照中..."
        }
    });

    const style = document.createElement('style');
    style.innerHTML = `
        .pagefind-ui__search-input { background: rgba(0,0,0,0.5) !important; color: #d5ccbd !important; border: 1px solid rgba(212,175,55,0.3) !important; border-radius: 12px !important; padding-left: 20px !important; }
        .pagefind-ui__search-input:focus { border-color: #d4af37 !important; box-shadow: 0 0 15px rgba(212,175,55,0.2) !important; }
        .pagefind-ui__message { color: #d4af37 !important; font-family: 'Noto Serif SC', serif !important; font-size: 18px !important; font-weight: bold; margin-bottom: 30px !important;}
        .pagefind-ui__result { border-bottom: 1px solid rgba(212,175,55,0.1) !important; padding: 25px 0 !important; }
        .pagefind-ui__result-title { color: #d4af37 !important; font-size: 22px !important; margin-bottom: 10px !important; font-family: 'Noto Serif SC', serif !important; }
        .pagefind-ui__result-link { text-decoration: none !important; }
        .pagefind-ui__result-link:hover .pagefind-ui__result-title { color: #fff !important; text-decoration: underline !important; }
        .pagefind-ui__result-excerpt { color: #d5ccbd !important; line-height: 1.8 !important; font-size: 15px; }
        .pagefind-ui__result-excerpt mark { background: rgba(212,175,55,0.3) !important; color: #fff !important; font-weight: bold; padding: 0 4px; border-radius: 2px;}
        .pagefind-ui__button { background: linear-gradient(135deg, #d4af37 0%, #aa8c2c 100%) !important; color: #000 !important; border: none !important; border-radius: 20px !important; font-weight: bold !important; cursor: pointer !important;}
    `;
    document.head.appendChild(style);

    const keywords = [
        {k: "大圆满", w: 30}, {k: "妥噶", w: 30}, {k: "彻却", w: 28}, {k: "大手印", w: 28}, {k: "上师瑜伽", w: 25}, 
        {k: "大威德", w: 22}, {k: "时轮金刚", w: 22}, {k: "胜乐金刚", w: 20}, {k: "玛哈嘎拉", w: 18}, {k: "绿度母", w: 18},
        {k: "莲花生", w: 25}, {k: "宗喀巴", w: 16}, {k: "中阴救度", w: 15}, {k: "颇瓦法", w: 15}, {k: "金刚萨埵", w: 25},
        {k: "观世音", w: 18}, {k: "药师佛", w: 15}, {k: "阿弥陀佛", w: 14}, {k: "菩提道", w: 20}, {k: "拙火", w: 15},
        {k: "普巴金刚", w: 15}, {k: "仪式", w: 15}, {k: "灌顶", w: 18}, {k: "修法", w: 15}, {k: "心要", w: 18}
    ];
    
    const cloud = document.getElementById('wordCloud');
    keywords.sort(() => Math.random() - 0.5).forEach(item => {
        const badge = document.createElement('div');
        badge.className = 'cloud-badge';
        badge.innerText = item.k;
        badge.style.fontSize = Math.min(24, Math.max(13, 12 + (item.w / 30) * 12)) + "px";
        if(Math.random() > 0.5) {
            badge.style.border = "1px solid rgba(212,175,55,0.4)";
            badge.style.color = "#d4af37";
            badge.style.background = "rgba(212,175,55,0.05)";
        } else {
            badge.style.border = "1px solid rgba(255,255,255,0.15)";
            badge.style.color = "#d5ccbd";
        }
        badge.onclick = () => {
            const inp = document.querySelector('.pagefind-ui__search-input');
            if(inp) {
                inp.value = item.k;
                inp.dispatchEvent(new Event('input', { bubbles: true }));
            }
        };
        cloud.appendChild(badge);
    });
});

// ---------- 卷轴弹窗阅读引擎 ----------
(function() {
    const modalHTML = `
    <style>
    #qv { display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; background:rgba(0,0,0,0.85); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); opacity:0; transition:opacity 0.3s; align-items:center; justify-content:center; }
    #qv-c { background:var(--bg); width:100%; height:100%; position:relative; transform:translateY(50px); transition:all 0.4s cubic-bezier(0.16, 1, 0.3, 1); display:flex; flex-direction:column; overflow:hidden; }
    @media(min-width: 850px) { #qv-c { max-width:900px; height:92%; border-radius:12px; border:1px solid rgba(212,175,55,0.2); } }
    #qv-h { padding:15px 20px; border-bottom:1px solid rgba(212,175,55,0.1); background:var(--surface-solid); display:flex; justify-content:space-between; align-items:center; }
    #qv-b { padding:0; overflow-y:auto; flex:1; -webkit-overflow-scrolling: touch; }
    </style>
    <div id="qv"><div id="qv-c">
        <div id="qv-h">
            <div style="font-weight:700; color:var(--primary); font-family:'Noto Serif SC', serif;">❖ 典藏经卷阅读</div>
            <button id="qv-x" style="background:rgba(255,255,255,0.1); border:none; width:32px; height:32px; border-radius:50%; color:#fff; cursor:pointer;">✕</button>
        </div>
        <div id="qv-b"></div>
    </div></div>`;
    document.body.insertAdjacentHTML('beforeend', modalHTML);

    const qv = document.getElementById('qv'), qvc = document.getElementById('qv-c'), qvb = document.getElementById('qv-b');
    
    function close() {
        qv.style.opacity = '0'; qvc.style.transform = 'translateY(50px)';
        setTimeout(() => { qv.style.display = 'none'; document.body.style.overflow = ''; }, 300);
    }
    document.getElementById('qv-x').onclick = close;
    qv.onclick = (e) => { if(e.target === qv) close(); };

    document.addEventListener('click', e => {
        const a = e.target.closest('a');
        if(a && a.href && a.href.includes('threads/')) {
            e.preventDefault();
            qv.style.display = 'flex'; void qv.offsetWidth;
            qv.style.opacity = '1'; qvc.style.transform = 'translateY(0)';
            document.body.style.overflow = 'hidden';
            qvb.innerHTML = '<div style="text-align:center; padding:100px; color:var(--primary);">观想加载中...</div>';
            
            fetch(a.href).then(r => r.text()).then(html => {
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const content = doc.querySelector('.container') || doc.body;
                const b = content.querySelector('.breadcrumb'); if(b) b.remove();
                qvb.innerHTML = '';
                qvb.appendChild(content);
                qvb.scrollTop = 0;
            }).catch(() => window.location.href = a.href);
        }
    });
})();
</script>

<div style="text-align: center; color: rgba(212,175,55,0.3); font-size: 12px; padding: 40px 0; font-family:'Noto Serif SC', serif;">
    ❖ 大千法界，唯心所造 ❖
</div>

</body>
</html>
