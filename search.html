<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
<title>藏密修海 ❖ 须弥法眼搜索</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
:root {
    --bg: #0d0a09;
    --surface: rgba(24, 18, 16, 0.85);
    --surface-solid: #1a1412;
    --text: #dfd5c5;
    --text-muted: #8b8073;
    --primary: #d4af37;
    --primary-hover: #f1c40f;
    --accent: #8a1c1c;
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--text); padding: 0; margin: 0; line-height: 1.8; background-image: radial-gradient(#241b18 1px, transparent 1px); background-size: 30px 30px; overflow-x: hidden; -webkit-tap-highlight-color: transparent;}
h1, h2, h3 { font-family: 'Noto Serif SC', serif; }
.hero { position: relative; text-align: center; padding: 60px 20px; background: radial-gradient(circle at center, #2d0f0f 0%, #0d0a09 100%); color: var(--primary); border-bottom: 2px solid rgba(212, 175, 55, 0.1); }
.hero h1 { font-size: clamp(24px, 8vw, 46px); margin: 0 0 16px 0; font-weight: 700; letter-spacing: 4px; text-shadow: 0 2px 20px rgba(212, 175, 55, 0.4); }
.container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
.cloud-card { background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(20,10,10,0.9) 100%); border: 1px solid rgba(212,175,55,0.2); border-radius: 16px; padding: 25px; margin-bottom: 50px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.cloud-badge { padding: 8px 18px; border-radius: 30px; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); font-family: 'Noto Serif SC', serif; margin: 6px; display: inline-block; border: 1px solid rgba(212,175,55,0.25); color: var(--text-muted); background: rgba(255,255,255,0.02); font-size: 15px; }
.cloud-badge:hover { background: rgba(212,175,55,0.15) !important; color: var(--primary) !important; transform: translateY(-2px); border-color: var(--primary); box-shadow: 0 5px 15px rgba(212,175,55,0.2); }
.cloud-badge.active { background: rgba(212,175,55,0.2) !important; color: var(--primary) !important; border-color: var(--primary); box-shadow: 0 0 15px rgba(212,175,55,0.3); }

/* Pagefind Global Styles */
.pagefind-ui { --pagefind-ui-primary: #d4af37; --pagefind-ui-text: #dfd5c5; --pagefind-ui-background: transparent; --pagefind-ui-border: rgba(212, 175, 55, 0.3); --pagefind-ui-font: inherit; }
        /* 11. 关键词云样式 */
        .keyword-cloud {
            padding: 15px 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(212,175,55,0.1);
        }
        .kw-tag {
            background: rgba(212,175,55,0.05);
            color: var(--text-muted);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid rgba(212,175,55,0.15);
            transition: all 0.3s;
        }
        .kw-tag:hover {
            background: rgba(212,175,55,0.15);
            color: var(--primary);
            border-color: var(--primary);
            transform: scale(1.05);
        }
        #qv { backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); background: rgba(13,10,9,0.8); }
    </style>
</head>
<body>

<div class="navbar">
    <a href="index.html">← 归转主脉</a>
    <h1>藏密修海 ❖ 叩问法海</h1>
    <div style="width:70px"></div>
</div>

<div class="container">
    <div class="cloud-card">
        <h2 style="color: var(--primary); font-size: 20px; letter-spacing: 4px; margin-bottom: 10px;">❖ 万象词典云 ❖</h2>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 25px;">点击法词，即刻照见三千大千世界</p>
        <div id="wordCloud"></div>
    </div>

    <!-- Pagefind UI -->
    <div id="search"></div>
</div>

<script src="./pagefind/pagefind-ui.js"></script>
<script>
window.addEventListener('DOMContentLoaded', () => {
    // 初始化 Pagefind
    window.pui = new PagefindUI({
        element: "#search",
        showSubResults: false,
        pageSize: 20,
        translations: {
            placeholder: "输入法言、经名、仪轨...",
            clear_search: "清 净",
            load_more: "更多法缘 ↓",
            zero_results: "法界未显示【[SEARCH_TERM]】之痕迹",
            many_results: "",
            searching: "法界观照中..."
        }
    });

    // URL 参数自动搜索
    const urlParams = new URLSearchParams(window.location.search);
    const query = urlParams.get('q');
    if (query) {
        setTimeout(() => {
            const inp = document.querySelector('.pagefind-ui__search-input');
            if (inp) {
                inp.value = query;
                inp.dispatchEvent(new Event('input', { bubbles: true }));
            }
        }, 300);
    }

    // ── 样式覆盖 ─────────────────────────────────────
    const style = document.createElement('style');
    style.innerHTML = `
        /* 1. 放大镜是 ::before 伪元素，必须这样隐 */
        .pagefind-ui__form::before { display: none !important; }

        /* 2. 搜索框：去掉为放大镜留的左边距 */
        .pagefind-ui__search-input {
            background: rgba(0,0,0,0.5) !important;
            background-image: none !important;
            color: #d5ccbd !important;
            border: 1px solid rgba(212,175,55,0.3) !important;
            border-radius: 12px !important;
            padding: 0 70px 0 20px !important;
            height: 60px !important;
            font-size: 18px !important;
        }

        /* 3. 清除按钮：隐藏，视觉更简洁 */
        .pagefind-ui__search-clear { display: none !important; }

        /* 4. 隐藏无用提示和加载更多 */
        .pagefind-ui__message { display: none !important; }
        /* 加载更多按钮：简洁风格 */
        .pagefind-ui__button {
            display: block !important;
            margin: 20px auto !important;
            width: auto !important;
            padding: 10px 30px !important;
            background: rgba(212,175,55,0.08) !important;
            border: 1px solid rgba(212,175,55,0.3) !important;
            border-radius: 20px !important;
            color: #d4af37 !important;
            font-size: 14px !important;
            cursor: pointer !important;
            transition: all 0.3s !important;
        }
        .pagefind-ui__button:hover {
            background: rgba(212,175,55,0.15) !important;
            border-color: rgba(212,175,55,0.6) !important;
        }

        /* 5. 结果行：去掉多余线条，保留细腻边界 */
        .pagefind-ui__result {
            border-bottom: 1px solid rgba(212,175,55,0.06) !important;
            padding: 16px 10px !important;
            margin: 0 !important;
            display: block !important;
            animation: fadeIn 0.4s ease forwards;
            opacity: 0;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .pagefind-ui__result:hover { background: rgba(212,175,55,0.03); }

        /* 6. 标题链接块 */
        .pagefind-ui__result-link {
            display: block !important;
            text-decoration: none !important;
            padding: 0 0 8px 0 !important;
            margin: 0 !important;
            color: var(--primary) !important; /* 强制锁定主色调 */
        }
        .pagefind-ui__result-link:visited { color: var(--primary) !important; }

        /* 7. 标题文字：更优雅的排版 */
        .pagefind-ui__result-title {
            display: block !important;
            color: var(--primary) !important; /* 再次确保不会变蓝 */
            font-size: 18px !important;
            font-weight: 700 !important;
            font-family: 'Noto Serif SC', serif !important;
            letter-spacing: 1.5px !important;
            margin: 0 !important;
            line-height: 1.4 !important;
        }

        /* 8. 摘要正文 */
        .pagefind-ui__result-excerpt {
            display: block !important;
            color: #d5ccbd !important;
            line-height: 1.9 !important;
            font-size: 16px !important;
            opacity: 0.9;
            padding: 0 !important;
            margin: 0 !important;
            font-family: 'Noto Serif SC', serif !important;
        }

        /* 9. 高亮词样式 */
        .pagefind-ui__result-excerpt mark {
            background: rgba(212,175,55,0.35) !important;
            color: #fff !important;
            font-weight: 800 !important;
            padding: 1px 3px;
            border-radius: 3px;
        }

        #search { height: auto; }
    `;
    document.head.appendChild(style);

    // ── 词云 ────────────────────────────────────────
    const keywords = ["大圆满", "妥噶", "彻却", "大手印", "上师瑜伽", "大威德", "时轮金刚", "胜乐金刚", "玛哈嘎拉", "绿度母", "莲花生", "宗喀巴", "中阴救度", "颇瓦法", "金刚萨埵", "观世音", "药师佛", "阿弥陀佛", "菩提道", "拙火", "金刚经", "实修"];
    const cloud = document.getElementById('wordCloud');
    keywords.sort(() => Math.random() - 0.5).forEach(k => {
        const badge = document.createElement('div');
        badge.className = 'cloud-badge';
        badge.innerText = k;
        badge.onclick = function() {
            document.querySelectorAll('.cloud-badge').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            const inp = document.querySelector('.pagefind-ui__search-input');
            if (inp) {
                inp.value = k;
                inp.dispatchEvent(new Event('input', { bubbles: true }));
            }
        };
        cloud.appendChild(badge);
    });

    // ── 跟踪当前搜索词 ───────────────────────────────
    let currentQuery = '';
    setTimeout(() => {
        const inp = document.querySelector('.pagefind-ui__search-input');
        if (inp) inp.addEventListener('input', e => { currentQuery = e.target.value.trim(); });
    }, 500);

    // ── 安全全词高亮（用 TreeWalker 处理文本节点）────
    function highlightFullQuery(container, query) {
        if (!query || query.length < 2) return;
        const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
            acceptNode(node) {
                const tag = node.parentNode.tagName;
                if (tag === 'MARK' || tag === 'SCRIPT' || tag === 'STYLE') return NodeFilter.FILTER_REJECT;
                return node.textContent.includes(query) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
            }
        });
        const nodes = [];
        let n;
        while ((n = walker.nextNode())) nodes.push(n);
        nodes.reverse().forEach(textNode => {
            const text = textNode.textContent;
            const idx = text.indexOf(query);
            if (idx === -1) return;
            const frag = document.createDocumentFragment();
            frag.appendChild(document.createTextNode(text.slice(0, idx)));
            const mark = document.createElement('mark');
            mark.textContent = text.slice(idx, idx + query.length);
            frag.appendChild(mark);
            frag.appendChild(document.createTextNode(text.slice(idx + query.length)));
            textNode.parentNode.replaceChild(frag, textNode);
        });
    }

    function mergeAdjacentMarks(container) {
        let html = container.innerHTML;
        let last;
        do { last = html; html = html.replace(/<\/mark>(\s*)<mark>/g, '$1'); } while (html !== last);
        container.innerHTML = html;
    }

    // ── 彻底解决“有的跳走，有的弹出”：全局监听结果容器 ────────────────
    const resultsArea = document.getElementById('search');
    resultsArea.addEventListener('click', e => {
        const link = e.target.closest('.pagefind-ui__result-link');
        if (link && link.href) {
            e.preventDefault();
            e.stopPropagation();
            if (window.openReader) window.openReader(link.href);
        }
    }, true);

    // 关键词云点击
    document.getElementById('kwCloud').addEventListener('click', e => {
        if (e.target.classList.contains('kw-tag')) {
            const input = document.querySelector('.pagefind-ui__search-input');
            if (input) {
                input.value = e.target.innerText;
                input.dispatchEvent(new Event('input', { bubbles: true }));
            }
        }
    });

    const observer = new MutationObserver(() => {
        if (isProcessing) return;
        isProcessing = true;
        try {
            // 全词高亮 + 合并相邻 mark
            document.querySelectorAll('.pagefind-ui__result-excerpt:not([data-processed])').forEach(excerpt => {
                excerpt.dataset.processed = 'true';
                if (currentQuery) highlightFullQuery(excerpt, currentQuery);
                mergeAdjacentMarks(excerpt);
            });
        } finally {
            setTimeout(() => { isProcessing = false; }, 50);
        }
    });
    observer.observe(document.getElementById('search'), { childList: true, subtree: true });
});

// ── 卷轴阅读弹窗 ──────────────────────────────────
(function() {
    const modalHTML = `
    <style>
    #qv { display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; background:rgba(0,0,0,0.9); backdrop-filter:blur(15px); opacity:0; transition:opacity 0.3s; align-items:center; justify-content:center; }
    #qv-c { background:var(--bg); width:100%; height:100%; position:relative; transform:translateY(100%); transition:all 0.5s cubic-bezier(0.16, 1, 0.3, 1); display:flex; flex-direction:column; overflow:hidden; }
    @media(min-width: 850px) { #qv-c { max-width:900px; height:95%; border-radius:16px; border:1px solid rgba(212,175,55,0.2); transform:translateY(50px); } }
    #qv-h { padding:18px 24px; border-bottom:1px solid rgba(212,175,55,0.1); background:var(--surface-solid); display:flex; justify-content:space-between; align-items:center; z-index:10; }
    #qv-b { padding:0; overflow-y:auto; flex:1; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
    #qv-x { background:rgba(255,255,255,0.1); border:none; width:36px; height:36px; border-radius:50%; color:#fff; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; transition:0.3s; }
    </style>
    <div id="qv"><div id="qv-c">
        <div id="qv-h">
            <div id="qv-title" style="font-weight:700; color:var(--primary); font-family:'Noto Serif SC', serif; letter-spacing:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:60%;">❖ 典藏阅读</div>
            <div id="qv-controls" style="display:flex; gap:12px; align-items:center;">
                <button id="qv-tts" style="background:rgba(212,175,55,0.15); border:1px solid var(--primary); color:var(--primary); padding:5px 15px; border-radius:20px; cursor:pointer; font-size:13px; font-weight:bold; white-space:nowrap;">🎧 聆听开示</button>
                <button id="qv-x">✕</button>
            </div>
        </div>
        <div id="qv-b"></div>
    </div></div>`;
    document.body.insertAdjacentHTML('beforeend', modalHTML);

    const qv = document.getElementById('qv'), qvc = document.getElementById('qv-c'), qvb = document.getElementById('qv-b');
    let speaker = false;

    // 暴露给全局，让 observer 里的 onclick 能调用
    window.openReader = function(url) {
        qv.style.display = 'flex'; void qv.offsetWidth; qv.style.opacity = '1'; qvc.style.transform = 'translateY(0)';
        document.body.style.overflow = 'hidden';
        qvb.innerHTML = '<div style="text-align:center; padding:120px; color:var(--primary);">加载中...</div>';
        fetch(url).then(r => r.text()).then(h => {
            const d = new DOMParser().parseFromString(h, 'text/html');
            // 从 <title> 标签取文章标题（第一个 h1 是站名，不可信）
            const titleEl = d.querySelector('title');
            if (titleEl) {
                const rawTitle = titleEl.textContent.split(' - ')[0].trim();
                document.getElementById('qv-title').innerText = rawTitle;
            }
            const c = d.querySelector('.container') || d.body;
            const b = c.querySelector('.breadcrumb'); if(b) b.remove();
            qvb.innerHTML = ''; qvb.appendChild(c); qvb.scrollTop = 0;
        });
    };

    function stop() { if(window.speechSynthesis) { window.speechSynthesis.cancel(); speaker = false; document.getElementById('qv-tts').innerHTML="🎧 聆听开示"; } }
    function close() { stop(); qv.style.opacity = '0'; qvc.style.transform = window.innerWidth >= 850 ? 'translateY(50px)' : 'translateY(100%)'; setTimeout(() => { qv.style.display = 'none'; document.body.style.overflow = ''; }, 400); }
    document.getElementById('qv-x').onclick = close;
    qv.onclick = (e) => { if(e.target === qv && window.innerWidth >= 850) close(); };

    document.getElementById('qv-tts').onclick = function() {
        if(speaker) { stop(); return; }
        const u = new SpeechSynthesisUtterance(qvb.innerText.replace(/[❖📿🧘]/g, '').slice(0, 5000));
        u.lang = 'zh-CN'; u.rate = 0.9; u.onend = stop;
        window.speechSynthesis.speak(u); speaker = true; this.innerHTML = "⏹ 止息开示";
    };
})();
</script>
</body>
</html>
