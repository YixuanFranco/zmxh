<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
<title>藏密修海 ❖ 须弥法眼搜索</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
:root { 
    --bg: #0d0a09; 
    --surface: rgba(24, 18, 16, 0.85); 
    --surface-solid: #1a1412;
    --text: #dfd5c5; 
    --text-muted: #8b8073; 
    --primary: #d4af37; 
    --primary-hover: #f1c40f; 
    --accent: #8a1c1c; 
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--text); padding: 0; margin: 0; line-height: 1.8; background-image: radial-gradient(#241b18 1px, transparent 1px); background-size: 30px 30px; overflow-x: hidden; -webkit-tap-highlight-color: transparent;}
h1, h2, h3 { font-family: 'Noto Serif SC', serif; }
.hero { position: relative; text-align: center; padding: 60px 20px; background: radial-gradient(circle at center, #2d0f0f 0%, #0d0a09 100%); color: var(--primary); border-bottom: 2px solid rgba(212, 175, 55, 0.1); }
.hero h1 { font-size: clamp(24px, 8vw, 46px); margin: 0 0 16px 0; font-weight: 700; letter-spacing: 4px; text-shadow: 0 2px 20px rgba(212, 175, 55, 0.4); }
.container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
.cloud-card { background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(20,10,10,0.9) 100%); border: 1px solid rgba(212,175,55,0.2); border-radius: 16px; padding: 25px; margin-bottom: 50px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.cloud-badge { padding: 8px 18px; border-radius: 30px; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); font-family: 'Noto Serif SC', serif; margin: 6px; display: inline-block; border: 1px solid rgba(212,175,55,0.25); color: var(--text-muted); background: rgba(255,255,255,0.02); font-size: 15px; }
.cloud-badge:hover { background: rgba(212,175,55,0.15) !important; color: var(--primary) !important; transform: translateY(-2px); border-color: var(--primary); box-shadow: 0 5px 15px rgba(212,175,55,0.2); }
.cloud-badge.active { background: rgba(212,175,55,0.2) !important; color: var(--primary) !important; border-color: var(--primary); box-shadow: 0 0 15px rgba(212,175,55,0.3); }
</style>
<link href="./pagefind/pagefind-ui.css" rel="stylesheet">
</head>
<body>

<div class="hero">
    <h1>藏密修海 ❖ 须弥法眼搜索</h1>
    <p style="color: var(--text-muted); font-style: italic;">于浩瀚大藏之间，寻觅法缘。</p>
    <a href="index.html" style="color: var(--primary); text-decoration: none; border: 1px solid var(--primary); padding: 8px 24px; border-radius: 30px; font-size: 14px; margin-top: 20px; display: inline-block; transition: all 0.3s;">❖ 返回法阵首页 ❖</a>
</div>

<div class="container">
    <!-- Word Cloud Section -->
    <div class="cloud-card">
        <h2 style="color: var(--primary); font-size: 20px; letter-spacing: 4px; margin-bottom: 10px;">❖ 万象词典云 ❖</h2>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 25px;">点击法词，即刻照见三千大千世界</p>
        <div id="wordCloud"></div>
    </div>

    <!-- Pagefind UI -->
    <div id="search"></div>
</div>

<script src="./pagefind/pagefind-ui.js"></script>
<script>
window.addEventListener('DOMContentLoaded', () => {
    new PagefindUI({ 
        element: "#search", 
        showSubResults: true,
        translations: {
            placeholder: "输入法言、经名、仪轨...",
            clear_search: "清 净",
            load_more: "加载更多法卷",
            zero_results: "法界未显示【[SEARCH_TERM]】之痕迹",
            many_results: "为【[SEARCH_TERM]】显现 [COUNT] 卷法轴",
            searching: "正在法界观照中..."
        }
    });

    const style = document.createElement('style');
    style.innerHTML = `
        .pagefind-ui__search-input { background: rgba(0,0,0,0.5) !important; color: #d5ccbd !important; border: 1px solid rgba(212,175,55,0.3) !important; border-radius: 12px !important; padding-left: 20px !important; height: 60px !important; font-size: 18px !important; }
        .pagefind-ui__search-input:focus { border-color: #d4af37 !important; box-shadow: 0 0 15px rgba(212,175,55,0.2) !important; }
        .pagefind-ui__search-clear { 
            background: rgba(212,175,55,0.1) !important; 
            color: #d4af37 !important; 
            border: 1px solid rgba(212,175,55,0.3) !important; 
            border-radius: 20px !important; 
            padding: 4px 15px !important; 
            font-size: 12px !important; 
            font-weight: bold !important; 
            height: 30px !important;
            margin-right: 15px !important;
            transition: all 0.3s !important;
        }
        .pagefind-ui__search-clear:hover { background: rgba(212,175,55,0.2) !important; box-shadow: 0 0 10px rgba(212,175,55,0.4) !important; }
        .pagefind-ui__message { color: #d4af37 !important; font-family: 'Noto Serif SC', serif !important; font-size: 18px !important; font-weight: bold; margin-bottom: 30px !important; border-bottom: 1px solid rgba(212,175,55,0.1); padding-bottom: 15px;}
        .pagefind-ui__result { border-bottom: 1px solid rgba(212,175,55,0.1) !important; padding: 30px 0 !important; }
        .pagefind-ui__result-title { color: #d4af37 !important; font-size: 22px !important; margin-bottom: 12px !important; font-family: 'Noto Serif SC', serif !important; line-height: 1.4 !important;}
        .pagefind-ui__result-link { text-decoration: none !important; }
        .pagefind-ui__result-link:hover .pagefind-ui__result-title { color: #fff !important; text-shadow: 0 0 10px rgba(212,175,55,0.3); }
        .pagefind-ui__result-excerpt { color: #d5ccbd !important; line-height: 2 !important; font-size: 15px; opacity: 0.9; }
        .pagefind-ui__result-excerpt mark { background: rgba(212,175,55,0.25) !important; color: #fff !important; font-weight: bold; padding: 2px 6px; border-radius: 4px;}
        .pagefind-ui__button { background: linear-gradient(135deg, #d4af37 0%, #aa8c2c 100%) !important; color: #000 !important; border: none !important; border-radius: 30px !important; font-weight: 800 !important; cursor: pointer !important; padding: 12px 30px !important; height: auto !important; margin-top: 20px !important;}
    `;
    document.head.appendChild(style);

    const keywords = ["大圆满", "妥噶", "彻却", "大手印", "上师瑜伽", "大威德", "时轮金刚", "胜乐金刚", "玛哈嘎拉", "绿度母", "莲花生", "宗喀巴", "中阴救度", "颇瓦法", "金刚萨埵", "观世音", "药师佛", "阿弥陀佛", "菩提道", "拙火", "曼陀罗", "五加行", "灌顶", "仪轨", "实修"];
    
    const cloud = document.getElementById('wordCloud');
    keywords.sort(() => Math.random() - 0.5).forEach(k => {
        const badge = document.createElement('div');
        badge.className = 'cloud-badge';
        badge.innerText = k;
        badge.onclick = function() {
            document.querySelectorAll('.cloud-badge').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            const inp = document.querySelector('.pagefind-ui__search-input');
            if(inp) {
                inp.value = k;
                inp.dispatchEvent(new Event('input', { bubbles: true }));
            }
        };
        cloud.appendChild(badge);
    });

    // 拦截结果渲染，剔除标题冗余信息
    const observer = new MutationObserver(() => {
        document.querySelectorAll('.pagefind-ui__result-title').forEach(el => {
            if(!el.dataset.cleaned) {
                el.innerHTML = el.innerHTML.replace(/藏密修海\s*❖\s*典藏经阁\s*-\s*/, '').replace(/\s*-\s*藏密修海典藏/, '');
                el.dataset.cleaned = "true";
            }
        });
    });
    observer.observe(document.getElementById('search'), { childList: true, subtree: true });
});

// ---------- 卷轴弹窗阅读引擎 ----------
(function() {
    const modalHTML = `
    <style>
    #qv { display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; background:rgba(0,0,0,0.9); backdrop-filter:blur(15px); -webkit-backdrop-filter:blur(15px); opacity:0; transition:opacity 0.3s; align-items:center; justify-content:center; }
    #qv-c { background:var(--bg); width:100%; height:100%; position:relative; transform:translateY(100%); transition:all 0.5s cubic-bezier(0.16, 1, 0.3, 1); display:flex; flex-direction:column; overflow:hidden; }
    @media(min-width: 850px) { #qv-c { max-width:900px; height:95%; border-radius:16px; border:1px solid rgba(212,175,55,0.2); transform:translateY(50px); } }
    #qv-h { padding:18px 24px; border-bottom:1px solid rgba(212,175,55,0.1); background:var(--surface-solid); display:flex; justify-content:space-between; align-items:center; z-index:10; }
    #qv-b { padding:0; overflow-y:auto; flex:1; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
    #qv-x { background:rgba(255,255,255,0.1); border:none; width:36px; height:36px; border-radius:50%; color:#fff; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; transition:0.3s; }
    #qv-x:hover { background:var(--accent); }
    </style>
    <div id="qv"><div id="qv-c">
        <div id="qv-h">
            <div id="qv-title" style="font-weight:700; color:var(--primary); font-family:'Noto Serif SC', serif; letter-spacing:1px;">❖ 典藏经卷阅读</div>
            <div id="qv-controls" style="display:flex; gap:12px; align-items:center;">
                <button id="qv-tts" style="background:rgba(212,175,55,0.15); border:1px solid var(--primary); color:var(--primary); padding:5px 15px; border-radius:20px; cursor:pointer; font-size:13px; font-weight:bold;">🎧 聆听开示</button>
                <button id="qv-x">✕</button>
            </div>
        </div>
        <div id="qv-b"></div>
    </div></div>`;
    document.body.insertAdjacentHTML('beforeend', modalHTML);

    const qv = document.getElementById('qv'), qvc = document.getElementById('qv-c'), qvb = document.getElementById('qv-b');
    let isSpeaking = false;

    function stopSpeak() {
        if(window.speechSynthesis) window.speechSynthesis.cancel();
        isSpeaking = false;
        document.getElementById('qv-tts').innerHTML = "🎧 聆听开示";
    }

    function close() {
        stopSpeak();
        qv.style.opacity = '0'; 
        qvc.style.transform = window.innerWidth >= 850 ? 'translateY(50px)' : 'translateY(100%)';
        setTimeout(() => { qv.style.display = 'none'; document.body.style.overflow = ''; }, 400);
    }
    document.getElementById('qv-x').onclick = close;
    qv.onclick = (e) => { if(e.target === qv && window.innerWidth >= 850) close(); };

    document.getElementById('qv-tts').onclick = function() {
        if(isSpeaking) { stopSpeak(); return; }
        const text = qvb.innerText.replace(/[❖📿🧘]/g, '').slice(0, 5000);
        const ut = new SpeechSynthesisUtterance(text);
        ut.lang = 'zh-CN'; ut.rate = 0.9;
        ut.onend = () => { isSpeaking = false; this.innerHTML = "🎧 聆听开示"; };
        window.speechSynthesis.speak(ut);
        isSpeaking = true;
        this.innerHTML = "⏹ 止息开示";
    };

    document.addEventListener('click', e => {
        const a = e.target.closest('a');
        if(a && a.href && a.href.includes('threads/')) {
            e.preventDefault();
            qv.style.display = 'flex'; void qv.offsetWidth;
            qv.style.opacity = '1'; qvc.style.transform = 'translateY(0)';
            document.body.style.overflow = 'hidden';
            qvb.innerHTML = '<div style="text-align:center; padding:120px; color:var(--primary); font-family:serif; letter-spacing:2px; animation:blink 1.5s infinite;">观想降临中...</div>';
            
            fetch(a.href).then(r => r.text()).then(html => {
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const content = doc.querySelector('.container') || doc.body;
                const b = content.querySelector('.breadcrumb'); if(b) b.remove();
                const h1 = content.querySelector('h1'); if(h1) document.getElementById('qv-title').innerText = h1.innerText;
                qvb.innerHTML = '';
                qvb.appendChild(content);
                qvb.scrollTop = 0;
            }).catch(() => window.location.href = a.href);
        }
    });
})();
</script>

<style>@keyframes blink { 0% {opacity:0.3;} 50% {opacity:1;} 100% {opacity:0.3;} }</style>
</body>
</html>
