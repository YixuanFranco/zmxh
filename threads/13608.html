<h1 style="margin-bottom: 40px; font-size: 28px; line-height: 1.3; font-weight: 700;">面对突如其来的困境，心中是烦恼，还是慈悲？</h1>
<div class="post" style="animation-delay: 0.0s"><div class="post-header"><div class="avatar">格</div>格力琼寺发表于 2024-7-27 19:14</div><div class="post-body">经验丰富的骑士不会从马上摔下来。同样的，当我们遭遇不可预期的伤害，或突如其来的困境。 <br/>
如果心中涌现的不是烦恼，而是爱与慈悲，就表示我们修心有所成就，能够利用生活中的困境。我们要一直这样努力下去，这是非常重要的。 <br/>
平静安宁，显示自身之智慧；不受烦恼约束，显示修道之进步；己身之圆满，将在梦境善行中展现，菩萨透过所行事业显现自身。 <br/>
我们要尽己所能，不断运用对治，让自己对每日的行为感到心安。藉由修心的善德，我们有能力把任何困境带到修行的道路上。 <br/>
